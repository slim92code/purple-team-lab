title: Password Spray via Kerberos Pre-Auth Failures
id: c8968f4b-b038-418a-ad42-2cd0b0e79ae4
status: experimental
description: >
    Detects a single source attempting Kerberos pre-authentication (4771) against
    many distinct accounts in a short window — the spray signature. Lockout is
    avoided because each account receives only one bad attempt; correlation on the
    source address, not per-account counts, is what surfaces it.
references:
    - https://attack.mitre.org/techniques/T1110/003/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.credential-access
    - attack.t1110.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4771
        Status: '0x18'   # pre-auth failed (bad password)
    timeframe: 5m
    condition: selection | count(TargetUserName) by IpAddress >= 5
fields:
    - IpAddress
    - TargetUserName
falsepositives:
    - Service account with stale credentials hammering the KDC
    - Mobile/sync client (ActiveSync) retry storms
level: medium

