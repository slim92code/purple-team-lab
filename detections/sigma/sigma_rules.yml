title: Scheduled Task Persistence Running as SYSTEM From User Path
id: 6c89b239-440b-40e7-b46b-672469730c84
status: stable
description: >
    Detects a scheduled task (4698) created by a non-system principal whose action
    points to a binary in a user-writable path and/or runs as SYSTEM. Common
    persistence pattern; masquerading task names (WindowsUpdate*, Adobe*) raise
    confidence.
references:
    - https://attack.mitre.org/techniques/T1053/005/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1053.005
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4698
    suspect_path:
        TaskContent|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Users\Public\'
            - '\ProgramData\'
    suspect_priv:
        TaskContent|contains: 'S-1-5-18'   # runs as SYSTEM
    filter_machine:
        SubjectUserName|endswith: '$'
    condition: selection and (suspect_path or suspect_priv) and not filter_machine
fields:
    - SubjectUserName
    - TaskName
    - TaskContent
falsepositives:
    - Software installers creating tasks under ProgramData
    - GPO preference task deployment (filter by known author)
level: high

