title: LSASS Process Access With Credential-Theft Access Mask
id: 691ee169-5050-4f4a-89be-69eeb0beac1d
status: stable
description: >
    Detects a process opening a handle to lsass.exe with an access mask consistent
    with memory reading (Mimikatz/comsvcs/procdump style credential theft).
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.credential-access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    selection:
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess:
            - '0x1010'
            - '0x1410'
            - '0x1438'
            - '0x143a'
            - '0x1fffff'
    filter_system:
        SourceImage|endswith:
            - '\wininit.exe'
            - '\csrss.exe'
            - '\MsMpEng.exe'
    condition: selection and not filter_system
fields:
    - SourceImage
    - TargetImage
    - GrantedAccess
falsepositives:
    - EDR/AV agents reading lsass for inspection (allowlist by signed path)
level: high

