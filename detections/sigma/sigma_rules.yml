# Purple Team Home Lab — Sigma Detection Pack
# Detection-as-Code. Vendor-agnostic. Compile to Splunk SPL with:
#   pip install sigma-cli pysigma-backend-splunk
#   sigma convert -t splunk -p sysmon -p windows-audit sigma_rules.yml
#
# Field-mapping note: rules use the Sysmon-native taxonomy (Image, CommandLine,
# DestinationIp ...) and Windows-Security taxonomy (EventID + extracted fields).
# Sigma processing pipelines (-p sysmon / -p windows-audit) map these to the
# field names your Splunk TAs already extract, so the generated SPL needs no
# manual `rex field=Message`.
#
# Each rule is a separate YAML document (--- separated). Split into per-rule
# files for a SigmaHQ-style repo if you prefer.

title: InstallUtil LOLBin Execution From User-Writable Path
id: 69f1d09a-e2da-4528-ae1c-521cf0d46f0d
status: experimental
description: >
    Detects InstallUtil.exe invoked with the /U (uninstall) flag against a DLL/EXE
    located in a user-writable directory. InstallUtil is a Microsoft-signed binary
    abused to execute .NET payloads without spawning powershell.exe, bypassing
    AppLocker policies that trust signed Microsoft binaries.
references:
    - https://attack.mitre.org/techniques/T1218/004/
    - https://lolbas-project.github.io/lolbas/Binaries/Installutil/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.defense-evasion
    - attack.execution
    - attack.t1218.004
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\InstallUtil.exe'
    selection_flags:
        CommandLine|contains|all:
            - '/U'
            - '/logfile='
    selection_path:
        CommandLine|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Users\Public\'
            - '\ProgramData\'
    condition: selection_img and selection_flags and selection_path
fields:
    - ParentImage
    - Image
    - CommandLine
falsepositives:
    - Legitimate .NET application (un)install run from a staging directory
    - Visual Studio build/deploy tooling
level: high

