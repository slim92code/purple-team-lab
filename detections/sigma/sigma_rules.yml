title: C2 Beacon — Network Connection From User-Writable Path Binary
id: fcde59d1-a7c4-43a7-962c-b578bebbff29
status: experimental
description: >
    Behavioral C2 detection. Flags any executable running from a user-writable
    directory that initiates network connections, independent of the file name.
    Deliberately NOT keyed on a specific implant name (e.g. a renamed binary) — an
    attacker renames the file trivially; the location + egress behavior is the
    durable signal. Pair with beacon-interval/jitter analysis for fidelity.
references:
    - https://attack.mitre.org/techniques/T1071/001/
    - https://attack.mitre.org/techniques/T1572/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.command-and-control
    - attack.t1071.001
    - attack.t1572
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        Initiated: 'true'
        Image|contains:
            - '\Temp\'
            - '\AppData\Local\Temp\'
            - '\Users\Public\'
            - '\ProgramData\'
    filter_known:
        Image|contains:
            - '\Microsoft\Teams\'
            - '\Microsoft\EdgeUpdate\'
    condition: selection and not filter_known
fields:
    - Image
    - DestinationIp
    - DestinationPort
falsepositives:
    - Legitimate apps that legitimately install into ProgramData and call home
    - Update agents staged in user-writable paths (allowlist by signed publisher)
level: high

