title: SAM/SYSTEM/SECURITY Hive Dump via reg.exe save
id: 3a39b9eb-fe64-4f3a-96e4-bf4e128547bf
status: stable
description: >
    Detects reg.exe used to save the SAM, SYSTEM, or SECURITY registry hives — the
    offline-credential-extraction precursor (feed to secretsdump). reg.exe is a
    legitimate binary; the save verb combined with these hives is the signal.
references:
    - https://attack.mitre.org/techniques/T1003/002/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.credential-access
    - attack.t1003.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith: '\reg.exe'
        - OriginalFileName: 'reg.exe'
    selection_cmd:
        CommandLine|contains: 'save'
    selection_hive:
        CommandLine|contains:
            - 'HKLM\SAM'
            - 'HKLM\SYSTEM'
            - 'HKLM\SECURITY'
            - '\SAM '
    condition: selection_img and selection_cmd and selection_hive
fields:
    - ParentImage
    - CommandLine
    - User
falsepositives:
    - Backup software (Veeam, BackupExec) performing legitimate hive exports
    - Administrator manual backup prior to an upgrade
level: high

