title: Kerberoasting via RC4 Service Ticket Request
id: 6e713f07-d2a3-4116-bd3c-0ed7cec91746
status: stable
description: >
    Detects a Kerberos TGS-REQ (4769) for a user service account (SPN) issued with
    RC4-HMAC encryption (0x17). On a modern domain enforcing AES, RC4 service tickets
    for SPN-bearing user accounts are a strong Kerberoasting indicator.
references:
    - https://attack.mitre.org/techniques/T1558/003/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.credential-access
    - attack.t1558.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4769
        TicketEncryptionType: '0x17'
    filter_machine:
        ServiceName|endswith: '$'
    filter_krbtgt:
        ServiceName: 'krbtgt'
    condition: selection and not 1 of filter_*
fields:
    - IpAddress
    - ServiceName
    - TargetUserName
    - TicketEncryptionType
falsepositives:
    - Legacy application or appliance that only supports RC4
    - Misconfigured service account left at RC4 (fix with msDS-SupportedEncryptionTypes)
level: high

