title: Active Directory Replication (DCSync) From Non-Machine Account
id: 8b9e89b8-53af-428e-89c0-f492bbb7d306
status: stable
description: >
    Detects a directory access (4662) requesting the DS-Replication-Get-Changes
    control-access rights from a non-machine account. Only Domain Controllers and
    explicitly delegated principals should request replication; a user account doing
    so indicates DCSync.
references:
    - https://attack.mitre.org/techniques/T1003/006/
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.credential-access
    - attack.t1003.006
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4662
        Properties|contains:
            - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'   # DS-Replication-Get-Changes
            - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'   # DS-Replication-Get-Changes-All
            - '89e95b76-444d-4c62-991a-0facbeda640c'   # Get-Changes-In-Filtered-Set
    filter_machine:
        SubjectUserName|endswith: '$'
    filter_dcs:
        SubjectUserName: 'MSOL_*'
    condition: selection and not 1 of filter_*
fields:
    - SubjectUserName
    - Properties
falsepositives:
    - Azure AD Connect / DirSync service accounts (whitelist by name)
    - Authorized read-only DC or backup solution with delegated replication
level: critical

