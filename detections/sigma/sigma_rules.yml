title: Kerbrute User Enumeration via Kerberos Error 0x6
id: 7e9af1b4-b721-4f1f-98b7-1aa47fa97fb3
status: experimental
description: >
    Detects a single source generating many KDC_ERR_C_PRINCIPAL_UNKNOWN (0x6)
    responses (4768) in a short window — the kerbrute userenum signature, where
    non-existent principals return 0x6 and existing ones return a pre-auth error.
    Most SIEMs alert only on 4625 and miss this; 4768 with result 0x6 is the tell.
references:
    - https://attack.mitre.org/techniques/T1087/002/
    - https://github.com/ropnop/kerbrute
author: Purple Lab (MARVEL.LOCAL)
date: 2026/01/15
tags:
    - attack.reconnaissance
    - attack.discovery
    - attack.t1087.002
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4768
        Status: '0x6'
    timeframe: 1m
    condition: selection | count() by IpAddress > 50
fields:
    - IpAddress
    - TargetUserName
falsepositives:
    - Misconfigured client repeatedly requesting a deleted/renamed principal
level: medium
