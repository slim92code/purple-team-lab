# Field extraction is provided by the TAs (Splunk_TA_microsoft_sysmon /
# Splunk_TA_windows) - not here. This stanza only fixes the timestamp drift
# documented in lab_issues.md #10 (VM pause/resume desync), so events index
# at event time, not ingest time.

[WinEventLog:Microsoft-Windows-Sysmon/Operational]
DATETIME_CONFIG = CURRENT
MAX_TIMESTAMP_LOOKAHEAD = 128
TRUNCATE = 0
