# By default the CIM data models constrain themselves with empty index allowlists,
# so acceleration may summarize nothing from your lab. Point them at the index your
# Windows/Sysmon data actually lands in (here: main).
#
# Apply to:  $SPLUNK_HOME/etc/apps/Splunk_SA_CIM/local/macros.conf

[cim_Endpoint_indexes]
definition = (index=main)
iseval = 0

[cim_Network_Traffic_indexes]
definition = (index=main)
iseval = 0
