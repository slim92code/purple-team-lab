# CIM data model acceleration for the tstats headliners in purple_lab.
#
# These stanzas belong to the CIM app, NOT to purple_lab. Apply by ONE of:
#   (a) Settings > Data Models > {Endpoint, Network_Traffic} > Edit > Acceleration > tick + Save, or
#   (b) drop this file into  $SPLUNK_HOME/etc/apps/Splunk_SA_CIM/local/datamodels.conf
#
# backfill_time governs how far back summaries are built; 7d is fine for a lab.

[Endpoint]
acceleration = 1
acceleration.earliest_time = -7d
acceleration.backfill_time = -7d

[Network_Traffic]
acceleration = 1
acceleration.earliest_time = -7d
acceleration.backfill_time = -7d
